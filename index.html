<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Fonts & Icons -->

      <div class="logos">

               onerror="this.style.display='none'" />
        </a>
        <img src="https://www.balcomedicalcentre.com/package/images/nabh.png"      alt="NABH" class="logo-badge" onerror="this.style.display='none'" />

        <a href="tel:07712237575" class="btn-portal"><i class="fa fa-phone"></i> Call Us</a>
        <a href="#" class="btn-appt"><i class="fa fa-calendar-check"></i> Book Appointment</a>
      </div>

      <button class="nav-toggle" aria-label="Toggle menu">
        <i class="fa fa-bars"></i>
      </button>
    </div>

  <div id="slot-specialities"></div>
  <div id="slot-doctors"></div>

  <div id="slot-news"></div>
  <div id="slot-partners"></div>

  <!-- SCRIPTS -->
  <script type="module" src="assets/js/main.js"></script>
